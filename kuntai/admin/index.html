<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuntai CMS — Editor</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DM Sans',system-ui,sans-serif;background:#0f0f0f;color:#fafaf7;min-height:100vh;display:flex;align-items:center;justify-content:center}
  #cms-loader{display:flex;flex-direction:column;align-items:center;gap:1.25rem;opacity:1;transition:opacity .4s}
  .loader-logo{font-family:Georgia,serif;font-size:2rem;font-weight:900;letter-spacing:-.04em;text-transform:uppercase;color:#fafaf7}
  .loader-sub{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#6b6b6b;font-family:monospace}
  .loader-bar{width:200px;height:2px;background:#2e2e2e;border-radius:2px;overflow:hidden;margin-top:.5rem}
  .loader-progress{height:100%;width:0;background:#e5ff00;border-radius:2px;animation:load 1.8s cubic-bezier(.16,1,.3,1) forwards}
  @keyframes load{to{width:100%}}
  .loader-text{font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:#6b6b6b;font-family:monospace}
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
<div id="cms-loader">
  <p class="loader-logo">Kuntai</p>
  <p class="loader-sub">Business Awake · CMS</p>
  <div class="loader-bar"><div class="loader-progress"></div></div>
  <p class="loader-text">Cargando editor...</p>
</div>
<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on('init', function(user) {
      if (!user) {
        window.netlifyIdentity.on('login', function() {
          document.location.href = '/admin/';
        });
      }
    });
  }
  window.addEventListener('load', function() {
    setTimeout(function() {
      var loader = document.getElementById('cms-loader');
      if (loader) { loader.style.opacity = '0'; setTimeout(function(){ loader.style.display='none'; }, 400); }
    }, 1800);
  });
</script>
</body>
</html>
